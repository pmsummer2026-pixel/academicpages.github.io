# =============================================================
#  _config.yml  —  Site-wide settings for your Academic Pages
#  Edit anything between the quotes to personalize your site.
# =============================================================

# ── Basic Info ───────────────────────────────────────────────
title: "Prithika Majumdar"                     # Appears in the browser tab
description: "Personal Academic Homepage."
url: "https://pmsummer2026-pixel.github.io"  # Replace with your GitHub username
baseurl: ""                            # Leave blank for a user/org site

# ── Author (shows in sidebar and SEO) ────────────────────────
author:
  name: "Prithika Majumdar"
  avatar: "/images/themes/picforwebsite.webp"        # Upload your photo to /images/
  bio: "I am a high school student interested in using STEM to help communities and make the world a better place."
  location: "Chicago, USA"
  email: "pmsummer2026@gmail.com"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:pmsummer2026@gmail.com"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/pmsummer2026-pixel"
    #- label: "Google Scholar"
    #  icon: "fas fa-fw fa-graduation-cap"
    #  url: "https://scholar.google.com/citations?user=YOURID"
    #- label: "Twitter / X"
    #  icon: "fab fa-fw fa-x-twitter"
    #  url: "https://twitter.com/yourusername"

# ── Build Settings ────────────────────────────────────────────
# These tell Jekyll (the engine that builds your site) how to work.
# You usually don't need to change these.
remote_theme: academicpages/academicpages.github.io@master
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# ── Collections ───────────────────────────────────────────────
# Collections are folders of related pages (publications, talks, etc.)
collections:
  publications:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/
  teaching:
    output: true
    permalink: /:collection/:path/

# ── Default Front Matter ──────────────────────────────────────
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true  # Show your sidebar profile on every page

# ── Analytics (optional) ─────────────────────────────────────
# Sign up at analytics.google.com, get a Measurement ID, paste it here.
# google_analytics: "G-XXXXXXXXXX"
